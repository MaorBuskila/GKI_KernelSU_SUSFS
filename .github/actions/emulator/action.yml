name: 'Setup Emulator Modules'
description: 'Build all ranchu virtio .ko files from source so CFI type hashes match the emulator'

inputs:
  android_version:
    description: 'Android version (e.g., android15)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true
  sublevel:
    description: 'Kernel sublevel'
    required: true
  os_patch_level:
    description: 'OS patch level (e.g., 2024-07)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure Emulator Kernel Modules
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        # GKI gki_defconfig has these virtio drivers as CONFIG_xxx=y (built into the Image),
        # which means no .ko is produced and the stock emulator's .ko files load against
        # built-in code that has different CFI type hashes → violations.
        # Forcing =m via fragment:
        #   - changes them from built-in to loadable modules
        #   - our .ko files are compiled from the same tree as the Image
        #   - CFI type hashes match → zero violations
        #
        # CFI-violating modules from boot log:
        #   virtio_blk    — drivers/block/virtio_blk.ko
        #   virtio_console — drivers/char/virtio_console.ko
        #   virtio_mmio   — drivers/virtio/virtio_mmio.ko
        #   virtio_pci    — drivers/virtio/virtio_pci.ko
        # Module registration + fragment only for 6.6+ kernels.
        #
        # Older kernels (5.10/5.15/6.1) have these virtio configs as protected =y:
        #   - 5.15: adding to gki_aarch64_modules causes modules.order mismatch
        #   - 6.1:  _COMMON_GKI_MODULES_LIST is shared with rockpi4 which already
        #           declares these → Kleaf filegroup name conflict
        # For those versions CONFIG_CFI_PERMISSIVE=y (in configure-kernel) is sufficient.

        if [[ "${{ inputs.kernel_version }}" == "6.6" || "${{ inputs.kernel_version }}" == "6.12" ]]; then
          echo "6.6+ kernel — applying virtio module fragment + registration"

          cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # Force virtio drivers as modules so we produce .ko files with matching CFI hashes
        CONFIG_VIRTIO_BLK=m
        CONFIG_VIRTIO_CONSOLE=m
        CONFIG_VIRTIO_MMIO=m
        CONFIG_VIRTIO_PCI=m
        EOF

          MODULES=(
            "drivers/block/virtio_blk.ko"
            "drivers/char/virtio_console.ko"
            "drivers/virtio/virtio_mmio.ko"
            "drivers/virtio/virtio_pci.ko"
          )

          for KO_PATH in "${MODULES[@]}"; do
            # Register in flat module list (legacy build.sh path)
            if ! grep -qF "$KO_PATH" common/android/gki_aarch64_modules 2>/dev/null; then
              echo "$KO_PATH" >> common/android/gki_aarch64_modules
              echo "  + gki_aarch64_modules: $KO_PATH"
            else
              echo "  ~ already in gki_aarch64_modules: $KO_PATH"
            fi

            # Register in modules.bzl (Bazel/Kleaf path)
            if [[ -f common/modules.bzl ]]; then
              if ! grep -qF "\"${KO_PATH}\"" common/modules.bzl; then
                sed -i "/_COMMON_GKI_MODULES_LIST = \[/,/^[[:space:]]*\]/{/^[[:space:]]*\]$/i\\    \"${KO_PATH}\",
                }" common/modules.bzl
                echo "  + modules.bzl: $KO_PATH"
              else
                echo "  ~ already in modules.bzl: $KO_PATH"
              fi
            fi
          done

          if [[ -f common/modules.bzl ]]; then
            MISSING=0
            for KO_PATH in "${MODULES[@]}"; do
              grep -qF "\"${KO_PATH}\"" common/modules.bzl || { echo "✗ Missing: $KO_PATH"; MISSING=1; }
            done
            [[ "$MISSING" -eq 0 ]] && echo "✓ All virtio modules registered in modules.bzl" || exit 1
          fi

        else
          echo "${{ inputs.kernel_version }} kernel — skipping virtio module registration (CFI_PERMISSIVE covers this)"
        fi

        # ABI bypass — adding modules outside the original ABI stubs list
        if [[ "${{ inputs.android_version }}" == "android12" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
          sed -i 's/^\s*exit 1$/    echo "Who Cares? Bypassing Now!"/' build/abi/compare_to_symbol_list
        elif [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.10" ]] \
          || [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" ]]; then
          sed -i 's/^\s*exit 1$/    echo "Who Cares? Bypassing Now!"/' build/kernel/abi/compare_to_symbol_list
        else
          perl -i -pe 's/^(\s*)return 1$/$1print("Who Cares? Bypassing Now!")\n$1return 0/g if /if missing_symbols:/../return 1/' build/kernel/abi/check_buildtime_symbol_protection.py
        fi
